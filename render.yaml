services:
  - type: web
    name: ai-email-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/seed_db.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////opt/render/project/src/data/emails.db
      - key: FAISS_INDEX_PATH
        value: /opt/render/project/src/data/faiss.index
      - key: FAISS_METADATA_PATH
        value: /opt/render/project/src/data/faiss_meta.json
      - key: LOG_LEVEL
        value: INFO
